{% extends "base.html" %}
{% block conteudo %}

<h2>Horários</h2>

<a href="{{ url_for('novo_horario') }}" class="btn btn-success mb-3">

Novo Horário

</a>

<table class="table table-striped">

<thead class="table-dark">

<tr>

<th>Data</th>
<th>Hora</th>
<th>Disponível</th>

</tr>

</thead>

<tbody>

{% for horario in horarios %}

<tr>

<td>{{ horario.data }}</td>

<td>{{ horario.hora }}</td>

<td>

{% if horario.disponivel %}

Sim

{% else %}

Não

{% endif %}

</td>

</tr>

{% endfor %}

</tbody>

</table>

{% endblock %}
