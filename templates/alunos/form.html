{% extends "base.html" %}

{% block conteudo %}

<h2>

{% if aluno %}

Editar Aluno

{% else %}

Novo Aluno

{% endif %}

</h2>

<form method="POST">

<div class="row">

<div class="col-md-6 mb-3">

<label>Nome</label>

<input

type="text"

name="nome"

class="form-control"

value="{{ aluno.nome if aluno else '' }}"

required>

</div>

<div class="col-md-6 mb-3">

<label>Email</label>

<input

type="email"

name="email"

class="form-control"

value="{{ aluno.email if aluno else '' }}"

required>

</div>

<div class="col-md-4 mb-3">

<label>Telefone</label>

<input

type="text"

name="telefone"

class="form-control"

value="{{ aluno.telefone if aluno else '' }}">

</div>

<div class="col-md-4 mb-3">

<label>Matrícula</label>

<input

type="text"

name="matricula"

class="form-control"

value="{{ aluno.matricula if aluno else '' }}"

required>

</div>

<div class="col-md-2 mb-3">

<label>Peso</label>

<input

type="number"

step="0.01"

name="peso"

class="form-control"

value="{{ aluno.peso if aluno else '' }}">

</div>

<div class="col-md-2 mb-3">

<label>Altura</label>

<input

type="number"

step="0.01"

name="altura"

class="form-control"

value="{{ aluno.altura if aluno else '' }}">

</div>

</div>

<button class="btn btn-success">

Salvar

</button>

<a
href="{{ url_for('listar_alunos') }}"
class="btn btn-secondary">

Cancelar

</a>

</form>

{% endblock %}
