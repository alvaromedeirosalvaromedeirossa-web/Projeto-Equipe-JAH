<!DOCTYPE html><html lang="pt-BR"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Editar Agendamento</title><script src="https://cdn.tailwindcss.com"></script></head><body class="bg-black text-white min-h-screen"><main class="max-w-2xl mx-auto p-6"><a href="/agendamentos" class="text-orange-500">← Voltar</a><div class="mt-6 bg-zinc-900 border border-zinc-800 rounded-2xl p-6"><h1 class="text-2xl font-bold mb-6">Editar Agendamento</h1><form action="/atualizar_agendamento/{{ agendamento[0] }}" method="POST" class="space-y-4"><label class="block"><span class="text-sm text-zinc-300">Aluno Id</span><input class="mt-1 w-full rounded-xl bg-zinc-800 border border-zinc-700 px-4 py-3" name="aluno_id" value="{{ agendamento[1] if agendamento else '' }}" required></label>
<label class="block"><span class="text-sm text-zinc-300">Instrutor Id</span><input class="mt-1 w-full rounded-xl bg-zinc-800 border border-zinc-700 px-4 py-3" name="instrutor_id" value="{{ agendamento[2] if agendamento else '' }}" required></label>
<label class="block"><span class="text-sm text-zinc-300">Horario Id</span><input class="mt-1 w-full rounded-xl bg-zinc-800 border border-zinc-700 px-4 py-3" name="horario_id" value="{{ agendamento[3] if agendamento else '' }}" required></label>
<label class="block"><span class="text-sm text-zinc-300">Status</span><input class="mt-1 w-full rounded-xl bg-zinc-800 border border-zinc-700 px-4 py-3" name="status" value="{{ agendamento[4] if agendamento else '' }}" required></label><button class="w-full bg-orange-600 hover:bg-orange-500 rounded-xl px-4 py-3 font-bold" type="submit">Salvar alterações</button></form></div></main></body></html>
