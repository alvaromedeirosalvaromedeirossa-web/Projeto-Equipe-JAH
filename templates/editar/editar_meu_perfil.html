<!DOCTYPE html>
<html lang="pt-BR">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Editar Perfil</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors:{
                        primary:"#ff6a00",
                        card:"#18181b"
                    }
                }
            }
        }
    </script>

</head>

<body class="bg-black min-h-screen flex items-center justify-center p-8">

<div class="bg-card w-full max-w-3xl rounded-3xl shadow-2xl border border-zinc-800 p-10">

    <h1 class="text-3xl text-white font-bold text-center mb-10">

        Editar Meu Perfil

    </h1>

    <form action="{{ url_for('salvar_meu_perfil') }}" method="POST">

        <div class="grid md:grid-cols-2 gap-6">

            <div>

                <label class="text-zinc-300">
                    Nome
                </label>

                <input
                    type="text"
                    name="nome"
                    value="{{ aluno.nome }}"
                    required
                    class="w-full mt-2 p-3 rounded-xl bg-zinc-900 text-white border border-zinc-700">

            </div>

            <div>

                <label class="text-zinc-300">
                    Email
                </label>

                <input
                    type="email"
                    name="email"
                    value="{{ aluno.email }}"
                    required
                    class="w-full mt-2 p-3 rounded-xl bg-zinc-900 text-white border border-zinc-700">

            </div>

            <div>

                <label class="text-zinc-300">
                    Telefone
                </label>

                <input
                    type="text"
                    name="telefone"
                    value="{{ aluno.telefone }}"
                    required
                    class="w-full mt-2 p-3 rounded-xl bg-zinc-900 text-white border border-zinc-700">

            </div>

            <div>

                <label class="text-zinc-300">
                    Matrícula
                </label>

                <input
                    type="text"
                    value="{{ aluno.matricula }}"
                    readonly
                    class="w-full mt-2 p-3 rounded-xl bg-zinc-800 text-zinc-400 border border-zinc-700 cursor-not-allowed">

            </div>

            <div>

                <label class="text-zinc-300">
                    Peso
                </label>

                <input
                    type="number"
                    step="0.01"
                    name="peso"
                    value="{{ aluno.peso }}"
                    required
                    class="w-full mt-2 p-3 rounded-xl bg-zinc-900 text-white border border-zinc-700">

            </div>

            <div>

                <label class="text-zinc-300">
                    Altura
                </label>

                <input
                    type="number"
                    step="0.01"
                    name="altura"
                    value="{{ aluno.altura }}"
                    required
                    class="w-full mt-2 p-3 rounded-xl bg-zinc-900 text-white border border-zinc-700">

            </div>

        </div>

        <div class="flex justify-between mt-10">

            <a
                href="{{ url_for('area_aluno') }}"
                class="bg-zinc-700 hover:bg-zinc-600 text-white px-8 py-3 rounded-xl">

                Cancelar

            </a>

            <button
                type="submit"
                class="bg-primary hover:bg-orange-600 text-white px-8 py-3 rounded-xl font-semibold">

                Salvar Alterações

            </button>

        </div>

    </form>

</div>

</body>
</html>
