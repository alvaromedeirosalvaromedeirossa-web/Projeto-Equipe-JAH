<!DOCTYPE html><html lang="pt-BR"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Editar Treino</title><script src="https://cdn.tailwindcss.com"></script></head><body class="bg-black text-white min-h-screen"><main class="max-w-2xl mx-auto p-6"><a href="/treinos" class="text-orange-500">← Voltar</a><div class="mt-6 bg-zinc-900 border border-zinc-800 rounded-2xl p-6"><h1 class="text-2xl font-bold mb-6">Editar Treino</h1><form action="/atualizar_treino/{{ treino[0] }}" method="POST" class="space-y-4"><label class="block"><span class="text-sm text-zinc-300">Nome</span><input class="mt-1 w-full rounded-xl bg-zinc-800 border border-zinc-700 px-4 py-3" name="nome" value="{{ treino[1] if treino else '' }}" required></label>
<label class="block"><span class="text-sm text-zinc-300">Descricao</span><input class="mt-1 w-full rounded-xl bg-zinc-800 border border-zinc-700 px-4 py-3" name="descricao" value="{{ treino[2] if treino else '' }}" required></label>
<label class="block"><span class="text-sm text-zinc-300">Aluno Id</span><input class="mt-1 w-full rounded-xl bg-zinc-800 border border-zinc-700 px-4 py-3" name="aluno_id" value="{{ treino[3] if treino else '' }}" required></label>
<label class="block"><span class="text-sm text-zinc-300">Instrutor Id</span><input class="mt-1 w-full rounded-xl bg-zinc-800 border border-zinc-700 px-4 py-3" name="instrutor_id" value="{{ treino[4] if treino else '' }}" required></label><button class="w-full bg-orange-600 hover:bg-orange-500 rounded-xl px-4 py-3 font-bold" type="submit">Salvar alterações</button></form></div></main></body></html>
