<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Informações Pessoais</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            500: '#ff6a00',
                            600: '#e05d00',
                        }
                    }
                }
            }
        }
    </script>
</head>

<body class="bg-black min-h-screen flex items-center justify-center p-6">

{% if plano_escolhido %}
<div class="fixed top-5 left-1/2 -translate-x-1/2 bg-brand-500 text-white px-8 py-4 rounded-xl shadow-xl">
    <p class="text-center font-bold">
        {{ plano_escolhido }}
        -
        {{ preco_escolhido }}
        {{ periodo_escolhido }}
    </p>
</div>
{% endif %}

<div class="bg-zinc-900 w-full max-w-2xl rounded-3xl shadow-2xl p-8">

    <h1 class="text-3xl font-bold text-white text-center mb-8">
        Informações Pessoais
    </h1>

    <form action="/finalizar_cadastro" method="POST" class="space-y-6">

        <div>
            <label class="block text-white mb-2">
                Nome Completo
            </label>

            <input
                type="text"
                name="nome"
                required
                class="w-full rounded-xl bg-zinc-800 text-white px-4 py-3 border border-zinc-700 focus:border-brand-500 outline-none">
        </div>

        <div>
            <label class="block text-white mb-2">
                Telefone
            </label>

            <input
                type="text"
                name="telefone"
                required
                class="w-full rounded-xl bg-zinc-800 text-white px-4 py-3 border border-zinc-700 focus:border-brand-500 outline-none">
        </div>

        <div>
            <label class="block text-white mb-2">
                E-mail
            </label>

            <input
                type="email"
                name="email"
                required
                class="w-full rounded-xl bg-zinc-800 text-white px-4 py-3 border border-zinc-700 focus:border-brand-500 outline-none">
        </div>

        <div>
            <label class="block text-white mb-2">
                Matrícula
            </label>

            <input
                type="text"
                name="matricula"
                required
                placeholder="Ex: 20260001"
                class="w-full rounded-xl bg-zinc-800 text-white px-4 py-3 border border-zinc-700 focus:border-brand-500 outline-none">
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">

            <div>
                <label class="block text-white mb-2">
                    Peso (kg)
                </label>

                <input
                    type="number"
                    step="0.01"
                    name="peso"
                    required
                    placeholder="Ex: 75.5"
                    class="w-full rounded-xl bg-zinc-800 text-white px-4 py-3 border border-zinc-700 focus:border-brand-500 outline-none">
            </div>

            <div>
                <label class="block text-white mb-2">
                    Altura (m)
                </label>

                <input
                    type="number"
                    step="0.01"
                    name="altura"
                    required
                    placeholder="Ex: 1.75"
                    class="w-full rounded-xl bg-zinc-800 text-white px-4 py-3 border border-zinc-700 focus:border-brand-500 outline-none">
            </div>

        </div>

        <button
            type="submit"
            class="w-full bg-brand-500 hover:bg-brand-600 text-white font-bold py-4 rounded-xl transition-all duration-300">
            Enviar Cadastro
        </button>

    </form>

</div>

</body>
</html>
