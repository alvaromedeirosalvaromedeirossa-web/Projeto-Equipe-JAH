{% extends "base.html" %}
{% block conteudo %}

<h2>Novo Pagamento</h2>

<form method="POST">

<select class="form-select mb-3" name="aluno_id">

{% for aluno in alunos %}

<option value="{{ aluno.id }}">{{ aluno.nome }}</option>

{% endfor %}

</select>

<select class="form-select mb-3" name="plano_id">

{% for plano in planos %}

<option value="{{ plano.id }}">{{ plano.nome }}</option>

{% endfor %}

</select>

<input class="form-control mb-3" type="number" step="0.01" name="valor" placeholder="Valor">

<input class="form-control mb-3" type="date" name="data">

<select class="form-select mb-3" name="status">

<option>Pago</option>

<option>Pendente</option>

</select>

<button class="btn btn-success">

Salvar

</button>

</form>

{% endblock %}
