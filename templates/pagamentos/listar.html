{% extends "base.html" %}
{% block conteudo %}

<h2>{{ "Editar Plano" if plano else "Novo Plano" }}</h2>

<form method="POST">

<div class="mb-3">
<label>Nome</label>
<input class="form-control" name="nome" value="{{ plano.nome if plano else '' }}">
</div>

<div class="mb-3">
<label>Valor</label>
<input class="form-control" type="number" step="0.01" name="valor" value="{{ plano.valor if plano else '' }}">
</div>

<div class="mb-3">
<label>Duração</label>
<input class="form-control" type="number" name="duracao" value="{{ plano.duracao if plano else '' }}">
</div>

<button class="btn btn-success">Salvar</button>

</form>

{% endblock %}
