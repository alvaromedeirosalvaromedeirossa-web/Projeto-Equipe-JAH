{% extends "base.html" %}
{% block conteudo %}

<h2>Avaliações</h2>

<a class="btn btn-success mb-3" href="{{ url_for('nova_avaliacao') }}">Nova Avaliação</a>

<table class="table table-striped">

<thead class="table-dark">

<tr>

<th>Aluno</th>

<th>Peso</th>

<th>Altura</th>

<th>IMC</th>

</tr>

</thead>

<tbody>

{% for avaliacao in avaliacoes %}

<tr>

<td>{{ avaliacao.aluno_id }}</td>

<td>{{ avaliacao.peso }}</td>

<td>{{ avaliacao.altura }}</td>

<td>{{ avaliacao.imc }}</td>

</tr>

{% endfor %}

</tbody>

</table>

{% endblock %}
