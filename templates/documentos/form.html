{% extends "base.html" %}
{% block conteudo %}

<h2>Novo Documento</h2>

<form method="POST">

<select class="form-select mb-3" name="aluno_id">

{% for aluno in alunos %}

<option value="{{ aluno.id }}">{{ aluno.nome }}</option>

{% endfor %}

</select>

<input class="form-control mb-3"
name="tipo"
placeholder="Tipo">

<input class="form-control mb-3"
name="arquivo"
placeholder="Nome do arquivo">

<button class="btn btn-success">

Salvar

</button>

</form>

{% endblock %}
