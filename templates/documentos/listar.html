{% extends "base.html" %}
{% block conteudo %}

<h2>Documentos</h2>

<a href="{{ url_for('novo_documento') }}" class="btn btn-success mb-3">
Novo Documento
</a>

<table class="table table-striped">

<thead class="table-dark">

<tr>

<th>ID</th>
<th>Aluno</th>
<th>Tipo</th>
<th>Arquivo</th>

</tr>

</thead>

<tbody>

{% for documento in documentos %}

<tr>

<td>{{ documento.id }}</td>
<td>{{ documento.aluno_id }}</td>
<td>{{ documento.tipo }}</td>
<td>{{ documento.arquivo }}</td>

</tr>

{% endfor %}

</tbody>

</table>

{% endblock %}
